apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: # Replace with your server image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: server-config
            - secretRef:
                name: server-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
  namespace: production
spec:
  selector:
    app: server
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP